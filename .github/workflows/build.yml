# GitHub Actions workflow: збірка проєкту через репівський devcontainer.
#
# Ключова ідея: CI використовує ТОЙ САМИЙ Dockerfile що й локально у
# VS Code. Інакше "works on my machine" виникає постійно: локальний
# devcontainer має одні версії тулів, CI runner інші. Тут вони однакові.

name: Build

# Тригери:
# - push.branches: [main] - запускаємо тільки при push у main (тобто
#   при merge PR). Обмеження важливе: без нього push + pull_request
#   запускали б одну й ту саму збірку двічі на кожен update PR.
# - pull_request: запускаємо при відкритті PR і кожному update гілки.
on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Try pull prebuilt devcontainer image
        continue-on-error: true
        run: docker pull "ghcr.io/${GITHUB_REPOSITORY_OWNER}/cpp-miltech-devcontainer:latest"

      - name: Build inside dev container
        uses: devcontainers/ci@v0.3
        with:
          push: never
          imageName: ghcr.io/${{ github.repository_owner }}/cpp-miltech-devcontainer
          cacheFrom: ghcr.io/${{ github.repository_owner }}/cpp-miltech-devcontainer:latest
          runCmd: |
            cmake --preset debug
            cmake --build --preset debug
            cmake --preset aarch64-debug
            cmake --build --preset aarch64-debug
